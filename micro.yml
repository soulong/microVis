name: micro
channels:
  - conda-forge
  - bioconda
dependencies:
  - python>=3.10
  - numpy
  - pandas
  - scipy
  - scikit-image
  - tifffile
  - cellpose
  - torch
  - jax
  - pyyaml
  - tqdm
  - pyside6
  - natsort
  - pydantic>=2.0
  - pillow
  - matplotlib
  - openpyxl
  - pytest
  - pytest-cov
  - ruff
  - pip
  - pip:
    - -e ../microProfiler
    - -e .
    - pygwalker>=0.4
